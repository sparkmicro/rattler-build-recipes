context:
  name: gcc-arm-none-eabi
  version: "15.2.1.1.1"
  
package:
  name: ${{ name }}
  version: ${{ version }}

source:
  # Linux (x86_64)
  - if: linux and x86_64
    then:
      url: https://github.com/xpack-dev-tools/arm-none-eabi-gcc-xpack/releases/download/v15.2.1-1.1/xpack-arm-none-eabi-gcc-15.2.1-1.1-linux-x64.tar.gz
      sha256: da6a49ad4003944b823c6c93702a8787c922ab34bd7e918ec0eaf6933a9b1ff6

  # Linux (AArch64)
  - if: linux and aarch64
    then:
      url: https://github.com/xpack-dev-tools/arm-none-eabi-gcc-xpack/releases/download/v15.2.1-1.1/xpack-arm-none-eabi-gcc-15.2.1-1.1-linux-arm64.tar.gz
      sha256: 67980c7990eba7bb7ffdf39699102effd70889f5ac427be19a8c8a6c5fab2972

  # macOS (x86_64)
  - if: osx and x86_64
    then:
      url: https://github.com/xpack-dev-tools/arm-none-eabi-gcc-xpack/releases/download/v15.2.1-1.1/xpack-arm-none-eabi-gcc-15.2.1-1.1-darwin-x64.tar.gz
      sha256: 5be906a5194c3173e145a58048e5607ffff947773237802b93e55e23c415f1b6

  # macOS (arm64)
  - if: osx and arm64
    then:
      url: https://github.com/xpack-dev-tools/arm-none-eabi-gcc-xpack/releases/download/v15.2.1-1.1/xpack-arm-none-eabi-gcc-15.2.1-1.1-darwin-arm64.tar.gz
      sha256: 574082d35e49a2bcbdc355836b2a3ae5e5bb3b9456c9f5e37177db2ab4aad870

  # Windows
  - if: win
    then:
      url: https://github.com/xpack-dev-tools/arm-none-eabi-gcc-xpack/releases/download/v15.2.1-1.1/xpack-arm-none-eabi-gcc-15.2.1-1.1-win32-x64.zip
      sha256: bae6a3d1667697ce750c3b13d6d26d80973ecedc2cc87bf04869e83447fd93ea

build:
  number: 0
  script:
    - if: unix
      then: |
        # Enter directory if it exists
        if ls -d gcc-arm-none-eabi-* 1> /dev/null 2>&1; then
          cd gcc-arm-none-eabi-*
        elif ls -d arm-gnu-toolchain-* 1> /dev/null 2>&1; then
          cd arm-gnu-toolchain-*
        elif ls -d xpack-arm-none-eabi-gcc-* 1> /dev/null 2>&1; then
          cd xpack-arm-none-eabi-gcc-*
        fi

        mkdir -p $PREFIX/bin
        mkdir -p $PREFIX/lib
        mkdir -p $PREFIX/share
        mkdir -p $PREFIX/arm-none-eabi
        
        cp -r bin/* $PREFIX/bin/
        cp -r lib/* $PREFIX/lib/
        cp -r share/* $PREFIX/share/
        cp -r arm-none-eabi/* $PREFIX/arm-none-eabi/
        
        if [ -d "libexec" ]; then
          mkdir -p $PREFIX/libexec
          cp -r libexec/* $PREFIX/libexec/
        fi

        if [ "$(uname)" = "Linux" ]; then
            cd $PREFIX/lib
            ln -sf libtinfo.so.6 libtinfo.so.5
            ln -sf libncurses.so.6 libncurses.so.5
            cd - > /dev/null
        fi

    - if: win
      then: |
        REM Find the directory (xPack extracts to a subdir) and enter it
        for /d %%D in (xpack-arm-none-eabi-gcc-*) do cd %%D
        for /d %%D in (gcc-arm-none-eabi-*) do cd %%D
        for /d %%D in (arm-gnu-toolchain-*) do cd %%D

        if not exist "%PREFIX%\\bin" mkdir "%PREFIX%\\bin"
        if not exist "%PREFIX%\\lib" mkdir "%PREFIX%\\lib"
        if not exist "%PREFIX%\\share" mkdir "%PREFIX%\\share"
        if not exist "%PREFIX%\\arm-none-eabi" mkdir "%PREFIX%\\arm-none-eabi"

        xcopy /s /y /i bin "%PREFIX%\\bin"
        xcopy /s /y /i lib "%PREFIX%\\lib"
        xcopy /s /y /i share "%PREFIX%\\share"
        xcopy /s /y /i arm-none-eabi "%PREFIX%\\arm-none-eabi"
        
        if exist "libexec" (
          if not exist "%PREFIX%\\libexec" mkdir "%PREFIX%\\libexec"
          xcopy /s /y /i libexec "%PREFIX%\\libexec"
        )

requirements:
  build:
    - make  # [unix]
  run:
    # Required for the symlink fix to work (provides libtinfo.so.6)
    - if: linux
      then:
        - ncurses
